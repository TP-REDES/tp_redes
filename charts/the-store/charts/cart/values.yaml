replicaCount: 1

image:
  repository: the-store-cart
  tag: latest
  pullPolicy: IfNotPresent

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 256m
    memory: 512Mi

persistence:
  provider: in-memory

service:
  type: ClusterIP
  port: 80

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 10

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

serviceAccount:
  name: carts

strategy:
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
